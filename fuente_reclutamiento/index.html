<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Reclutamiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .spinner { 
            animation: spin 1s linear infinite; border: 2px solid transparent; 
            border-top-color: #4f46e5; border-radius: 50%; width: 20px; height: 20px; 
            display: inline-block; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Panel de Reclutamiento</h1>
                <p class="text-sm text-gray-500">Consulta y Seguimiento de Candidatos</p>
            </div>
            
            <div class="w-full md:w-80">
                <label class="block text-[10px] font-bold text-indigo-500 uppercase mb-1">Fuente de Datos:</label>
                <select id="sheet-selector" onchange="loadTable()" class="w-full p-3 rounded-xl border-none shadow-sm font-semibold text-gray-700 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="CESANTES ATENDIDOS">📍 CESANTES ATENDIDOS</option>
                    <option value="BANCO DE OFERENTES EN FRONT">🏢 BANCO DE OFERENTES EN FRONT</option>
                    <option value="PROYECTOS - JAC">🏗️ PROYECTOS - JAC</option>
                    <option value="RETIRADOS CON CREDITO">💳 RETIRADOS CON CREDITO</option>
                </select>
            </div>
        </div>

        <div class="glass rounded-3xl shadow-xl overflow-hidden border border-white">
            <div class="p-6 border-b border-gray-100 flex gap-4">
                <input type="text" id="search-input" onkeyup="filterTable()" placeholder="Buscar por nombre o documento..." class="flex-1 p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-100 border-none text-sm">
                <button onclick="loadTable()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all">🔄 Actualizar</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-[11px] uppercase text-gray-400 font-bold italic">
                            <th class="p-4">Identificación</th>
                            <th class="p-4">Nombre Completo</th>
                            <th class="p-4">Perfil / Cargo</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzKRUboZX7ajwxJbFRW3QqIh9raYs8hlpnVNOpbdIa0FZI2T3TNAi89O1DGIRWqFMF_/exec";

        async function loadTable() {
            const sheetName = document.getElementById('sheet-selector').value;
            const body = document.getElementById('table-body');
            body.innerHTML = `<tr><td colspan="4" class="p-10 text-center"><span class="spinner"></span> Cargando base de datos...</td></tr>`;

            try {
                const response = await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'getData', sheetName: sheetName }) 
                });
                const res = await response.json();

                if (res.status === "success") {
                    window.currentData = res.data; // Guardar para búsqueda local
                    renderRows(res.data);
                }
            } catch (e) {
                body.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500 font-bold">Error: No se pudo conectar con el servidor.</td></tr>`;
            }
        }

        function renderRows(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = "";
            data.forEach(item => {
                // 1. Identificadores flexibles
                const doc = item["DOCUMENTO"] || item["IDENTIFICACIÓN"] || item["CEDULA"] || "N/A";
                const nombre = item["NOMBRE COMPLETO"] || item["NOMBRE"] || (item["PRIMER_NOMBRE"] + " " + item["PRIMER_APELLIDO"]) || "S/N";
                
                // 2. AQUÍ AGREGAS LAS COLUMNAS QUE QUIERAS TRAER
                const celular = item["CELULAR"] || "Sin Tel";
                const perfil = item["PERFIL LABORAL"] || item["CARGO ESTANDARIZADO"] || "N/A";
                const municipio = item["MUNICIPIO"] || "-"; // Ejemplo de columna extra
        
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="p-4 font-bold text-gray-800">${nombre}</td>
                    <td class="p-4 text-xs">${doc}</td>
                    <td class="p-4 text-xs text-indigo-600 font-bold">${celular}</td> <td class="p-4 text-xs text-gray-500">${perfil}</td>
                    <td class="p-4 text-xs text-gray-400 italic">${municipio}</td> <td class="p-4 text-right">
                        <button onclick="abrirModalGestion('${doc}')" class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg">GESTIONAR</button>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        function filterTable() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = window.currentData.filter(item => {
                const searchString = Object.values(item).join(" ").toLowerCase();
                return searchString.includes(term);
            });
            renderRows(filtered);
        }

        function verDetalle(id) {
            Swal.fire({
                title: 'Gestión de Candidato',
                text: 'Aquí se abrirá el formulario para editar las 19 columnas de seguimiento del ID: ' + id,
                icon: 'info',
                confirmButtonColor: '#4f46e5'
            });
        }

        window.onload = loadTable;

// --- FUNCIÓN DEL MODAL CON 4 OPCIONES ---

async function abrirModalGestion(idCandidato) {
    const { value: gestionSeleccionada } = await Swal.fire({
        title: 'Registrar Gestión',
        text: `Candidato ID: ${idCandidato}`,
        input: 'select',
        inputOptions: {
            'POSTULADO': '✅ POSTULADO',
            'REMITIDO': '📤 REMITIDO',
            'COLOCADO': '🎉 COLOCADO',
            'DESCARTADO': '❌ DESCARTADO'
        },
        inputPlaceholder: 'Seleccione un estado',
        showCancelButton: true,
        confirmButtonColor: '#10b981',
        cancelButtonText: 'Cancelar'
    });

    if (gestionSeleccionada) {
        // Mostrar cargando
        Swal.fire({ title: 'Guardando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

        try {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'saveGestion',
                    sheetName: document.getElementById('sheet-selector').value,
                    id: idCandidato,
                    nuevaGestion: gestionSeleccionada + " (" + new Date().toLocaleDateString() + ")"
                })
            });
            const data = await res.json();
            if (data.status === "success") {
                Swal.fire('¡Éxito!', 'La gestión se anexó al Excel correctamente', 'success');
                loadTable(); // Refrescar para ver cambios si fuera necesario
            }
        } catch (e) {
            Swal.fire('Error', 'No se pudo guardar la gestión', 'error');
        }
    }
}

        
    </script>
</body>
</html>
