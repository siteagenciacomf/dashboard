<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Reclutamiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loading-skeleton { 
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); 
            background-size: 200% 100%; 
            animation: loading 1.5s infinite; 
        }
        @keyframes loading { 
            0% { background-position: 200% 0; } 
            100% { background-position: -200% 0; } 
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Panel de Reclutamiento</h1>
                <p class="text-sm text-gray-500">Consulta y Seguimiento de Candidatos</p>
            </div>
            <div class="w-full md:w-80">
                <label class="block text-[10px] font-bold text-indigo-500 uppercase mb-1">Fuente de Datos:</label>
                <select id="sheet-selector" onchange="loadTable()" class="w-full p-3 rounded-xl border-none shadow-sm font-semibold text-gray-700 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="CESANTES ATENDIDOS">📍 CESANTES ATENDIDOS</option>
                    <option value="BANCO DE OFERENTES EN FRONT">🏢 BANCO DE OFERENTES EN FRONT</option>
                    <option value="PROYECTOS - JAC">🏗️ PROYECTOS - JAC</option>
                    <option value="RETIRADOS CON CREDITO">💳 RETIRADOS CON CRÉDITO</option>
                </select>
            </div>
        </div>

        <div class="glass rounded-3xl shadow-xl overflow-hidden border border-white">
            <!-- FILTROS -->
            <div class="p-6 border-b border-gray-100 flex flex-wrap gap-3">
                <input type="text" id="search-input" onkeyup="applyFilters()" placeholder="Buscar en todas las columnas..." class="flex-1 min-w-[240px] p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-100 border-none text-sm">

                <div id="edad-filter-container" class="hidden">
                    <input type="text" id="edad-filter" onkeyup="applyFilters()" placeholder="Edad (25 o 20-35)" class="w-40 p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-100 border-none text-sm">
                </div>

                <input type="text" id="gestion-filter" onkeyup="applyFilters()" placeholder="Filtrar por Gestión" class="w-48 p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-100 border-none text-sm">

                <button onclick="loadTable()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all whitespace-nowrap">🔄 Actualizar</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead id="table-head" class="bg-gray-50 text-[11px] uppercase text-gray-400 font-bold italic"></thead>
                    <tbody id="table-body" class="text-sm divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ────────────────────────────────────────────────
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzKRUboZX7ajwxJbFRW3QqIh9raYs8hlpnVNOpbdIa0FZI2T3TNAi89O1DGIRWqFMF_/exec";
        // ────────────────────────────────────────────────

        let cacheData = [];
        let currentConfig = {};

        // CONFIGURACIÓN EXACTA POR HOJA (columnas en el orden que pediste)
        const sheetConfigs = {
            "CESANTES ATENDIDOS": {
                columns: ["AÑO","EDAD","GENERO","TIPO DE DOCUMENTO","DOCUMENTO","PRIMER_APELLIDO","SGDO_APELLIDO","PRIMER_NOMBRE","CELULAR","CELULAR 2","CORREO ELECTRONICO","MUNICIPIO","NIVEL DE ESCOLARIDAD","ESTUDIOS REALIZADOS","EMPRESA EN QUE LABORO","CARGO ESTANDARIZADO","RANGO DE TIEMPO DE EXPERIENCIA","PERFIL LABORAL","GESTION"],
                idKey: "DOCUMENTO"
            },
            "BANCO DE OFERENTES EN FRONT": {
                columns: ["IDENTIFICACIÓN","NOMBRE Y APELLIDOS","GENERO","NIVEL ACADEMICO","BANCO DE OFERENTES - PERFIL LABORAL","OBSERVACION","GESTION"],
                idKey: "IDENTIFICACIÓN"
            },
            "PROYECTOS - JAC": {
                columns: ["JAC","TIPO DE DOCUMENTO","DOCUMENTO","NOMBRE COMPLETO","GÉNERO","EDAD","CELULAR","CELULAR 2","CORREO ELECTRÓNICO","NIVEL DE ESCOLARIDAD","ESTUDIO REALIZADO","EMPRESA EN QUE LABORÓ","CARGO DESEMPEÑADO","TIEMPO LABORADO ÚLTIMO EMPLEO","PERFIL OCUPACIONAL","GESTION"],
                idKey: "DOCUMENTO"
            },
            "RETIRADOS CON CREDITO": {
                columns: ["CEDULA","NOMBRE","CELULAR","CORREO ELECTRONICO","NIVEL DE ESCOLARIDAD","ESTUDIOS REALIZADOS","INSTITUCION","EMPRESA EN QUE LABORO","CARGO ESTANDARIZADO","AÑOS DE EXPERIENCIA(ULTIMO EMPLEO)","OBSERVACIONES","GESTION"],
                idKey: "CEDULA"
            }
        };

        async function loadTable() {
            const sheetName = document.getElementById('sheet-selector').value;
            currentConfig = sheetConfigs[sheetName];
            const body = document.getElementById('table-body');
            const head = document.getElementById('table-head');

            // Skeleton
            body.innerHTML = Array(6).fill(0).map(() => `<tr>${currentConfig.columns.map(() => `<td class="p-4"><div class="h-4 loading-skeleton rounded"></div></td>`).join('')}<td></td></tr>`).join('');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getData', sheetName: sheetName })
                });
                const res = await response.json();

                if (res.status === "success") {
                    cacheData = res.data || [];
                    renderTableHead();
                    renderRows(cacheData);

                    // Mostrar/ocultar filtro de EDAD
                    const edadContainer = document.getElementById('edad-filter-container');
                    edadContainer.classList.toggle('hidden', !currentConfig.columns.includes('EDAD'));
                }
            } catch (e) {
                body.innerHTML = `<tr><td colspan="${currentConfig.columns.length + 1}" class="p-10 text-center text-red-600">Error al cargar datos</td></tr>`;
            }
        }

        function renderTableHead() {
            const head = document.getElementById('table-head');
            head.innerHTML = `
                <tr>
                    ${currentConfig.columns.map(col => `<th class="p-4 whitespace-nowrap">${col}</th>`).join('')}
                    <th class="p-4 text-center">Acciones</th>
                </tr>
            `;
        }

        function renderRows(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = "";

            const displayData = data.slice(0, 300);

            displayData.forEach(item => {
                const id = item[currentConfig.idKey] || "N/A";
                let rowHTML = '';

                currentConfig.columns.forEach(col => {
                    let value = item[col] || '-';
                    if (col === "GESTION") {
                        value = value || '<span class="text-gray-400 italic">Sin gestión</span>';
                    }
                    rowHTML += `<td class="p-4 text-xs ${col.includes('GESTION') ? 'text-gray-500' : 'text-gray-700'}">${value}</td>`;
                });

                rowHTML += `
                    <td class="p-4 text-center">
                        <button onclick="abrirModalGestion('${id}')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-xl text-[10px] font-black shadow transition-all">
                            GESTIONAR
                        </button>
                    </td>
                `;

                const row = document.createElement('tr');
                row.className = "hover:bg-indigo-50/50 transition-colors";
                row.innerHTML = rowHTML;
                body.appendChild(row);
            });

            if (data.length > 300) {
                const note = document.createElement('tr');
                note.innerHTML = `<td colspan="${currentConfig.columns.length + 1}" class="p-3 text-center text-xs text-gray-500 italic">Mostrando 300 de ${data.length} registros • Usa los filtros</td>`;
                body.appendChild(note);
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            const edadTerm = document.getElementById('edad-filter').value.trim();
            const gestionTerm = document.getElementById('gestion-filter').value.toLowerCase().trim();

            let filtered = cacheData;

            // Búsqueda general
            if (searchTerm) {
                filtered = filtered.filter(item => 
                    Object.values(item).some(v => String(v || "").toLowerCase().includes(searchTerm))
                );
            }

            // Filtro EDAD (soporta "25" o "20-35")
            if (edadTerm) {
                filtered = filtered.filter(item => {
                    const edadStr = String(item["EDAD"] || "");
                    if (!edadStr) return false;
                    const edad = parseInt(edadStr);
                    if (isNaN(edad)) return false;

                    if (edadTerm.includes('-')) {
                        const [min, max] = edadTerm.split('-').map(n => parseInt(n.trim()));
                        return edad >= (min || 0) && edad <= (max || 999);
                    }
                    return edadStr.includes(edadTerm);
                });
            }

            // Filtro Gestión
            if (gestionTerm) {
                filtered = filtered.filter(item => 
                    String(item["GESTION"] || "").toLowerCase().includes(gestionTerm)
                );
            }

            renderRows(filtered);
        }

        // MODAL MEJORADO (sin DESCARTADO + Código de Vacante)
        async function abrirModalGestion(idCandidato) {
            const { value: tipo } = await Swal.fire({
                title: 'Tipo de Gestión',
                input: 'select',
                inputOptions: {
                    'POSTULACIÓN': '✅ POSTULACIÓN',
                    'REMISIÓN': '📤 REMISIÓN',
                    'COLOCACIÓN': '🎉 COLOCACIÓN'
                },
                inputPlaceholder: 'Selecciona una opción',
                showCancelButton: true,
                confirmButtonColor: '#10b981'
            });

            if (!tipo) return;

            // Segundo paso: Código de Vacante
            const { value: codigo } = await Swal.fire({
                title: `Código de Vacante - ${tipo}`,
                input: 'text',
                inputPlaceholder: 'Ej: VAC-2026-045 o 12345',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                inputValidator: (value) => {
                    if (!value) return '¡Debes ingresar el código de la vacante!';
                }
            });

            if (!codigo) return;

            Swal.fire({ title: 'Guardando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'saveGestion',
                        sheetName: document.getElementById('sheet-selector').value,
                        id: idCandidato,
                        nuevaGestion: `${tipo} - Vacante: ${codigo} (${new Date().toLocaleDateString('es-CO')})`
                    })
                });

                const result = await res.json();
                if (result.status === "success") {
                    Swal.fire('¡Guardado!', 'Gestión y código de vacante registrados', 'success');
                    loadTable();
                }
            } catch (err) {
                Swal.fire('Error', 'No se pudo guardar', 'error');
            }
        }

        window.onload = loadTable;
    </script>
</body>
</html>
