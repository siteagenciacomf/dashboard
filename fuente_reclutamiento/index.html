        const sheetConfigs = {

        async function loadTable() {
            const sheetName = document.getElementById('sheet-selector').value;
            currentConfig = sheetConfigs[sheetName];

            // 1. Mostrar el Loading y resetear la barra
            const overlay = document.getElementById('loading-overlay');
            const bar = document.getElementById('loading-bar');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            bar.style.width = '0%';
            
            // Forzamos un pequeño delay para que la animación de la barra inicie
            setTimeout(() => { bar.style.width = '100%'; }, 100);

            // Preparar esqueletos en la tabla
            document.getElementById('table-body').innerHTML = Array(6).fill(0).map(() => 
                `<tr>${currentConfig.columns.map(() => `<td class="p-4"><div class="h-4 loading-skeleton rounded w-full"></div></td>`).join('')}<td></td></tr>`
            ).join('');

            const msgLabel = document.getElementById('loading-msg');
            const mensajes = [
                "Conectando con SharePoint...",
                "Extrayendo miles de registros...",
                "Ya casi, no te desesperes...",
                "Casi listo, preparando vista..."
            ];
            
            let i = 0;
            const intervalMsg = setInterval(() => {
                if(i < mensajes.length) {
                    msgLabel.innerText = mensajes[i];
                    i++;
                }
            }, 25000); // Cambia el mensaje cada 25 segundos





            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getData', sheetName })
                });
                const data = await res.json();

                if (data.status === "success") {
                    cacheData = data.data || [];
                    // --- NUEVA LÓGICA DE ORDENAMIENTO ---
                    if (sheetName === "CESANTES ATENDIDOS") {
                        cacheData.sort((a, b) => {
                            // Ordenamos por AÑO de mayor a menor (Descendente)
                            // Usamos Number() para asegurarnos que trate el año como número
                            const añoA = Number(a["AÑO"]) || 0;
                            const añoB = Number(b["AÑO"]) || 0;
                            return añoB - añoA; 
                        });
                    }
                    // ------------------------------------
                    renderTableHead();
                    renderRows(cacheData);
                    updateFilterVisibility(sheetName);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('table-body').innerHTML = `<tr><td colspan="${currentConfig.columns.length + 1}" class="p-10 text-center text-red-600">Error de conexión</td></tr>`;
            } finally {
                // --- AGREGAMOS ESTA LÍNEA AQUÍ ---
                clearInterval(intervalMsg); 
                // ---------------------------------
                // 2. Ocultar el Loading cuando la respuesta llegue
                // Independientemente de si tardó 30 segundos o 2 minutos.
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
                bar.style.transition = 'none'; // Resetear transición para la próxima vez
                bar.style.width = '0%';
                setTimeout(() => { bar.style.transition = 'width 120000ms linear'; }, 100);
            }
        }

        function renderTableHead() {
            document.getElementById('table-head').innerHTML = `
                <tr>
                    ${currentConfig.columns.map(col => `<th class="p-4 whitespace-nowrap">${col}</th>`).join('')}
                    <th class="p-4 text-center sticky right-0 bg-gray-50 z-20">Acciones</th>
                </tr>
            `;
        }

        function renderRows(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = "";
            const display = data.slice(0, 300);

            display.forEach(item => {
                const id = item[currentConfig.idKey] || "N/A";
                let html = currentConfig.columns.map(col => {
                    let val = item[col] || '-';
                    if (col.toUpperCase().includes('GESTION')) val = val || '<span class="italic text-gray-400">Sin gestión</span>';
                    return `<td class="p-3 text-xs text-gray-700 truncate max-w-xs">${val}</td>`;
                }).join('');

                html += `<td class="p-3 text-center sticky right-0 bg-white z-10"><button onclick="abrirModalGestion('${id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-xl text-[10px] font-black shadow transition-all">GESTIONAR</button></td>`;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = html;
                body.appendChild(tr);
            });

            if (data.length > 300) {
                body.innerHTML += `<tr><td colspan="${currentConfig.columns.length + 1}" class="p-3 text-center text-xs text-gray-500 italic">Mostrando 300 de ${data.length} • Usa filtros</td></tr>`;
            }
        }

        function updateFilterVisibility(sheetName) {
            if (!sheetName) return;

            // Normalizamos: quitar espacios extras, convertir a mayúsculas, quitar emojis/texto no deseado
            const normalizedSheet = sheetName.trim().replace(/[^a-zA-Z0-9\s-]/g, '').toUpperCase();

            console.log("Hoja normalizada para comparación:", normalizedSheet); // ← verás esto en consola

            const filters = document.querySelectorAll('[data-sheet], [data-filter-for]');

            filters.forEach(el => {
                const sheetsStr = (el.getAttribute('data-sheet') || '').trim();
                if (!sheetsStr) {
                    // Filtros globales (edad, genero, etc.)
                    if (el.dataset.filterFor) {
                        const col = el.dataset.filterFor.toUpperCase();
                        const visible = currentConfig.columns.some(c => c.toUpperCase().includes(col));
                        el.classList.toggle('hidden', !visible);
                    }
                    return;
                }

                // Filtros por hoja → normalizamos también los data-sheet
                const allowedSheets = sheetsStr.split(/\s+/).map(s => 
                    s.trim().replace(/[^a-zA-Z0-9\s-]/g, '').toUpperCase()
                );

                const shouldShow = allowedSheets.includes(normalizedSheet) || allowedSheets.some(s => normalizedSheet.includes(s));

                el.classList.toggle('hidden', !shouldShow);

                // Log para depurar
                console.log(`Filtro ${el.id || 'sin-id'}: data-sheet="${sheetsStr}", debería mostrar=${shouldShow}, hidden=${el.classList.contains('hidden')}`);
            });
        }

        function applyFilters() {
            let filtered = cacheData;
            const sheet = document.getElementById('sheet-selector').value;

            // Búsqueda general
            const search = document.getElementById('search-input').value.toLowerCase().trim();
            if (search) filtered = filtered.filter(r => Object.values(r).some(v => String(v||'').toLowerCase().includes(search)));

            // Edad
            const edad = document.getElementById('edad-filter').value.trim();
            if (!document.getElementById('edad-filter').classList.contains('hidden') && edad) {
                filtered = filtered.filter(r => {
                    const e = parseInt(r["EDAD"] || 0);
                    if (edad.includes('-')) {
                        const [min, max] = edad.split('-').map(n => parseInt(n.trim()));
                        return e >= (min||0) && e <= (max||999);
                    }
                    return String(e).includes(edad);
                });
            }

            // Género
            const genero = document.getElementById('genero-filter').value;
            if (!document.getElementById('genero-filter').classList.contains('hidden') && genero) {
                filtered = filtered.filter(r => {
                    const g = (r["GENERO"] || r["GÉNERO"] || "").toUpperCase().trim();
                    if (genero === "M") return g.startsWith("M") || g.includes("MASCULINO");
                    if (genero === "F") return g.startsWith("F") || g.includes("FEMENINO");
                    if (genero === "O") return !["M","F","MASCULINO","FEMENINO"].some(v => g.includes(v));
                    return true;
                });
            }

            // Gestión
            const gestion = document.getElementById('gestion-filter').value.toLowerCase().trim();
            if (!document.getElementById('gestion-filter').classList.contains('hidden') && gestion) {
                filtered = filtered.filter(r => String(r["GESTION"] || "").toLowerCase().includes(gestion));
            }

            // Filtros adicionales por hoja
            if (sheet === "CESANTES ATENDIDOS") {

                const anio = document.getElementById('anio-filter').value.trim();
                if (anio) filtered = filtered.filter(r => String(r["AÑO"] || "").includes(anio));

                const nivel = document.getElementById('nivel-escolar-filter').value.trim().toUpperCase();
                if (nivel) {
                    filtered = filtered.filter(r =>
                        String(r["NIVEL DE ESCOLARIDAD"] || "").trim().toUpperCase() === nivel
                    );
                }

                const cargo = document.getElementById('cargo-filter').value.toLowerCase().trim();
                if (cargo) filtered = filtered.filter(r => 
                    String(r["CARGO ESTANDARIZADO"] || "").toLowerCase().includes(cargo)
                );

                const rango = document.getElementById('rango-exp-filter').value;
                if (rango) filtered = filtered.filter(r => 
                    (r["RANGO DE TIEMPO DE EXPERIENCIA"] || "") === rango
                );
            }

            if (sheet === "PROYECTOS - JAC") {
                const nivel = document.getElementById('nivel-escolar-filter').value.toLowerCase().trim();
                if (nivel) filtered = filtered.filter(r => String(r["NIVEL DE ESCOLARIDAD"] || "").toLowerCase().toUpperCase().includes(nivel));

                const tiempo = document.getElementById('tiempo-ult-empleo-filter').value.toLowerCase().trim();
                if (tiempo) filtered = filtered.filter(r => String(r["TIEMPO LABORADO ÚLTIMO EMPLEO"] || "").toLowerCase().includes(tiempo));
            }

            if (sheet === "RETIRADOS CON CREDITO") {
                const nivel = document.getElementById('nivel-escolar-filter').value.toLowerCase().trim();
                if (nivel) filtered = filtered.filter(r => String(r["NIVEL DE ESCOLARIDAD"] || "").toLowerCase().toUpperCase().includes(nivel));
            }

            renderRows(filtered);
        }



        async function seleccionarUsuario() {

            const responsablesOptions = {};

            Object.entries(responsables).forEach(([grupo, personas]) => {
                responsablesOptions[grupo] = personas.reduce((o, n) => {
                    o[n] = n;
                    return o;
                }, {});
            });

            const { value: usuario } = await Swal.fire({
                title: "Reclutador:",
                input: "select",
                inputOptions: responsablesOptions,
                inputPlaceholder: "Seleccionar usuario...",
                allowOutsideClick: false,
                confirmButtonText: "Entrar",
                confirmButtonColor: "#10b981",
                inputValidator: (value) => {
                    if (!value) {
                        return "Debes seleccionar un usuario";
                    }
                }
            });

            if (usuario) {
                    usuarioActual = usuario;
                    localStorage.setItem("usuarioGestion", usuario);
                    
                    // --- AGREGA ESTA LÍNEA AQUÍ ---
                    document.getElementById("app-container").style.display = "block";
                    // ------------------------------

                    document.getElementById("usuario-actual").innerText = "Reclutador: " + usuarioActual;
            }

            // Mostrar siempre el usuario arriba
            document.getElementById("usuario-actual").innerText = "Reclutador: " + usuarioActual;
        }









        function cerrarSesion(){
            localStorage.removeItem("usuarioGestion");
            location.reload();
        }












        async function abrirModalGestion(idCandidato) {



            const responsablesOptions = {};

            Object.entries(responsables).forEach(([grupo, personas]) => {
                responsablesOptions[grupo] = personas.reduce((o, n) => {
                    o[n] = n;
                    return o;
                }, {});
            });


            const { value: tipo } = await Swal.fire({
                title: 'Tipo de Gestión',
                input: 'select',
                inputOptions: { 'POSTULACIÓN': '✅ POSTULACIÓN', 'REMISIÓN': '📤 REMISIÓN', 'COLOCACIÓN': '🎉 COLOCACIÓN' },
                showCancelButton: true,
                confirmButtonColor: '#10b981'
            });
            if (!tipo) return;

            const { value: codigo } = await Swal.fire({
                title: `Código de Vacante - ${tipo}`,
                input: 'text',
                inputPlaceholder: 'Ej: VAC-2026-045',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                inputValidator: v => !v && 'Ingresa el código'
            });
            if (!codigo) return;





            const responsable = usuarioActual;

            Swal.fire({ title: 'Guardando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const text = `${tipo} - Vacante: ${codigo} (${new Date().toLocaleDateString('es-CO')}) - Por: ${responsable}`;

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'saveGestion',
                        sheetName: document.getElementById('sheet-selector').value,
                        id: idCandidato,
                        nuevaGestion: text
                    })
                });
                const result = await res.json();
                if (result.status === "success") {
                    Swal.fire('Guardado', '', 'success');
                    loadTable();
                }
            } catch {
                Swal.fire('Error', 'No se pudo guardar', 'error');
            }
        }


        document.getElementById("usuario-actual").innerText = "Reclutador: " + usuarioActual;

        window.onload = async () => {
            if (!usuarioActual) {
                await seleccionarUsuario();
            } else {
                // Si ya existe el usuario, mostramos el panel directamente
                document.getElementById("app-container").style.display = "block";
                document.getElementById("usuario-actual").innerText = "Reclutador: " + usuarioActual;
            }
            loadTable();
        };




        // Función para llenar el select del login al cargar
        function popularSelectorLogin() {
            const psicGroup = document.getElementById('group-psic');
            const auxGroup = document.getElementById('group-aux');
            
            // Limpiamos por si acaso
            psicGroup.innerHTML = '';
            auxGroup.innerHTML = '';

            responsables["👨‍💼 PSICORIENTADORES"].forEach(p => {
                psicGroup.innerHTML += `<option value="${p}">${p}</option>`;
            });

            responsables["🧾 AUXILIARES"].forEach(p => {
                auxGroup.innerHTML += `<option value="${p}">${p}</option>`;
            });
        }

        // Nueva función para entrar desde el botón de la tarjeta
        function accesoDirecto() {
            const select = document.getElementById('user-direct-select');
            const usuario = select.value;

            if (!usuario) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Atención',
                    text: 'Por favor, selecciona un usuario de la lista.',
                    confirmButtonColor: '#5c54ed'
                });
                return;
            }

            usuarioActual = usuario;
            localStorage.setItem("usuarioGestion", usuario);
            
            document.getElementById("login-container").style.display = "none";
            document.getElementById("app-container").style.display = "block";
            document.getElementById("usuario-actual").innerText = "Reclutador: " + usuarioActual;
            
            loadTable();
        }

        // Modificamos el window.onload para incluir la población del select
        window.onload = async () => {
            popularSelectorLogin(); // <--- Llenamos el select con los nombres

            if (!usuarioActual) {
                document.getElementById("login-container").style.display = "flex";
                document.getElementById("app-container").style.display = "none";
            } else {
                document.getElementById("login-container").style.display = "none";
                document.getElementById("app-container").style.display = "block";
                document.getElementById("usuario-actual").innerText = "Reclutador: " + usuarioActual;
                loadTable();
            }
        };



    </script>
